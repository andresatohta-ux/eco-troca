<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Troca - Feira de Ciências</title>

<style>
body{
font-family: Arial;
margin:0;
background:#eef7ee;
}

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input, select, textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

.btn{background:#2e7d32;color:white;}
.btn-blue{background:#1565c0;color:white;}
.btn-red{background:#c62828;color:white;}
.btn-yellow{background:#f9a825;color:black;}

.userBox{
display:flex;
align-items:center;
gap:10px;
}

.userBox img{
width:40px;
height:40px;
border-radius:50%;
}
</style>
</head>

<body>

<header>
<h1>🌍 Eco Troca</h1>
<p>Feira de Ciências - Sustentabilidade e Reutilização</p>
</header>

<div class="container">

<!-- LOGIN -->
<div class="card">
<h2>👤 Usuário</h2>
<div id="userInfo">Não logado</div>
<button class="btn" onclick="loginGoogle()">Entrar com Google</button>
<button class="btn-red" onclick="logout()">Sair</button>
</div>

<!-- PUBLICAR -->
<div class="card">
<h2>📦 Publicar item</h2>

<input id="nome" placeholder="Nome do item">
<input id="cidade" placeholder="Cidade">

<select id="categoria">
<option value="Livro">📚 Livro</option>
<option value="Caderno">📒 Caderno</option>
<option value="Mochila">🎒 Mochila</option>
<option value="Material">✏ Material escolar</option>
</select>

<textarea id="descricao" placeholder="Descrição"></textarea>

<!-- 📸 CÂMERA / GALERIA -->
<input id="imagem" type="file" accept="image/*" capture="environment">

<button class="btn" onclick="publicar()">Publicar</button>
</div>

<!-- FILTROS -->
<div class="card">
<h2>🔎 Filtros</h2>

<input id="filtroCidade" placeholder="Filtrar por cidade">
<select id="filtroCategoria">
<option value="">Todas categorias</option>
<option value="Livro">📚 Livro</option>
<option value="Caderno">📒 Caderno</option>
<option value="Mochila">🎒 Mochila</option>
<option value="Material">✏ Material escolar</option>
</select>

<button class="btn-blue" onclick="aplicarFiltro()">Aplicar filtro</button>
</div>

<div id="listaItens"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
updateDoc,
arrayUnion,
arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyBQtiPkVwkTYNmbGXKD96FIOITKQ8oI62A",
authDomain: "eco-troca-fecb3.firebaseapp.com",
projectId: "eco-troca-fecb3",
storageBucket: "eco-troca-fecb3.firebasestorage.app",
messagingSenderId: "813565372",
appId: "1:813565372:web:470f850a6f11fda93b97b9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user = null;
let dadosCache = [];
let imagemBase64 = "";

/* 📸 CAPTURA IMAGEM */
document.getElementById("imagem").addEventListener("change", function(e){
  const file = e.target.files[0];

  const reader = new FileReader();
  reader.onload = function(event){
    imagemBase64 = event.target.result;
  };

  reader.readAsDataURL(file);
});

/* LOGIN */
window.loginGoogle = async function(){
const provider = new GoogleAuthProvider();
await signInWithPopup(auth, provider);
}

window.logout = async function(){
await signOut(auth);
}

/* USER */
onAuthStateChanged(auth,(u)=>{
user = u;

document.getElementById("userInfo").innerHTML =
user ? `👤 ${user.displayName}` : "Não logado";
});

/* PUBLICAR */
window.publicar = async function(){

if(!user){
alert("Faça login!");
return;
}

await addDoc(collection(db,"itens"),{
nome: nome.value,
cidade: cidade.value,
categoria: categoria.value,
descricao: descricao.value,
imagem: imagemBase64 || "",
owner: user.displayName,
photo: user.photoURL,
likes: [],
chat: []
});

alert("Publicado!");
}

/* CURTIR */
window.like = async function(id, likes){

let ref = doc(db,"itens",id);

if(likes.includes(user.displayName)){
await updateDoc(ref,{likes: arrayRemove(user.displayName)});
}else{
await updateDoc(ref,{likes: arrayUnion(user.displayName)});
}
}

/* TROCA */
window.trocar = function(nome){
alert("Você demonstrou interesse em trocar com: " + nome);
}

/* FILTRO */
window.aplicarFiltro = function(){

let cidadeF = filtroCidade.value.toLowerCase();
let catF = filtroCategoria.value;

render(dadosCache, cidadeF, catF);
}

/* LISTA */
const lista = document.getElementById("listaItens");

function render(data, cidadeF="", catF=""){

lista.innerHTML = "";

data
.filter(i=>{
let okCidade = i.cidade.toLowerCase().includes(cidadeF);
let okCat = catF ? i.categoria === catF : true;
return okCidade && okCat;
})
.forEach((i,d)=>{

let likes = i.likes || [];
let isOwner = i.owner === user?.displayName;

lista.innerHTML += `
<div class="card">

<h3>${i.nome}</h3>
<p>📍 ${i.cidade}</p>
<p>📚 ${i.categoria}</p>
<p>${i.descricao}</p>

${i.photo ? `<div class="userBox">
<img src="${i.photo}">
<strong>${i.owner}</strong>
</div>` : ""}

${i.imagem ? `<img src="${i.imagem}" style="width:100%;border-radius:10px;">` : ""}

<button class="btn-blue" onclick="like('${i.id}', ${JSON.stringify(likes)})">
❤️ Curtir (${likes.length})
</button>

<button class="btn-yellow" onclick="trocar('${i.owner}')">
🔁 Quero trocar
</button>

${isOwner ? `<button class="btn-red" onclick="excluir('${i.id}')">🗑 Excluir</button>` : ""}

</div>
`;
});
}

/* FIREBASE LISTENER */
onSnapshot(collection(db,"itens"),(snapshot)=>{

dadosCache = [];

snapshot.forEach(d=>{
dadosCache.push({id:d.id,...d.data()});
});

render(dadosCache);
});
</script>

</body>
</html>

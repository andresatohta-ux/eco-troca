<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
getFirestore,collection,addDoc,onSnapshot,doc,updateDoc,arrayUnion,arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

import {
getAuth,GoogleAuthProvider,signInWithPopup,onAuthStateChanged,signOut
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBQtiPkVwkTYNmbGXKD96FIOITKQ8oI62A",
authDomain:"eco-troca-fecb3.firebaseapp.com",
projectId:"eco-troca-fecb3",
storageBucket:"eco-troca-fecb3.firebasestorage.app",
messagingSenderId:"813565372",
appId:"1:813565372:web:470f850a6f11fda93b97b9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let dadosCache=[];
let imagemBase64="";

/* 📸 IMAGEM */
document.getElementById("imagem").addEventListener("change",e=>{
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=ev=>imagemBase64=ev.target.result;
reader.readAsDataURL(file);
});

/* 🔐 LOGIN */
window.loginGoogle=()=>signInWithPopup(auth,new GoogleAuthProvider());
window.logout=()=>signOut(auth);

onAuthStateChanged(auth,u=>{
user=u;
document.getElementById("userInfo").innerText =
user?user.displayName:"Não logado";
});

/* 📦 PUBLICAR */
window.publicar=async()=>{
if(!user)return alert("login!");

await addDoc(collection(db,"itens"),{
nome:nome.value,
cidade:cidade.value,
categoria:categoria.value,
descricao:descricao.value,
imagem:imagemBase64||"",
owner:user.displayName,
uid:user.uid,
likes:[],
chat:{},
status:"livre",
interessado:null
});

alert("Publicado!");
};

/* ❤️ LIKE (TOGGLE) */
window.like=async(id,likes)=>{
if(!user)return;

const ref=doc(db,"itens",id);
const nome=user.displayName;

if((likes||[]).includes(nome)){
await updateDoc(ref,{likes:arrayRemove(nome)});
}else{
await updateDoc(ref,{likes:arrayUnion(nome)});
}
};

/* 🔁 PEDIR TROCA */
window.trocar=async(id)=>{
if(!user)return;

const ref=doc(db,"itens",id);

await updateDoc(ref,{
status:"negociacao",
interessado:{
uid:user.uid,
nome:user.displayName
},
[`chat.${user.uid}`]:arrayUnion({
user:user.displayName,
msg:"Tenho interesse na troca",
time:Date.now()
})
});
};

/* 🟢 ACEITAR */
window.aceitar=async(id)=>{
const ref=doc(db,"itens",id);

await updateDoc(ref,{
status:"aceito"
});
};

/* 🔴 RECUSAR */
window.recusar=async(id)=>{
const ref=doc(db,"itens",id);

await updateDoc(ref,{
status:"livre",
interessado:null
});
};

/* 💬 ENVIAR MENSAGEM */
window.enviarMsg=async(id)=>{
const input=document.getElementById("msg-"+id);
const msg=input.value;
if(!msg)return;

const ref=doc(db,"itens",id);

await updateDoc(ref,{
[`chat.${user.uid}`]:arrayUnion({
user:user.displayName,
msg,
time:Date.now()
})
});

input.value="";
};

/* 🔎 FILTRO */
window.aplicarFiltro=()=>{
render(
dadosCache,
filtroCidade.value.toLowerCase(),
filtroCategoria.value
);
};

/* 🧱 RENDER */
const lista=document.getElementById("listaItens");

function render(data,cidadeF="",catF=""){

lista.innerHTML="";

data
.filter(i=>{
return i.cidade.toLowerCase().includes(cidadeF)
&& (!catF || i.categoria===catF);
})
.forEach(i=>{

const likes=i.likes||[];
const chat=i.chat?.[user?.uid]||[];

lista.innerHTML+=`
<div class="card">

<h3>${i.nome}</h3>
<p>${i.cidade} | ${i.categoria}</p>
<p>${i.descricao}</p>

${i.imagem?`<img src="${i.imagem}" style="width:100%;border-radius:10px">`:""}

${i.status==="negociacao"?'<div class="badge">🟡 Em negociação</div>':""}
${i.status==="aceito"?'<div class="badge" style="background:green">🟢 Aceito</div>':""}

<button class="btn-blue" onclick="like('${i.id}',${JSON.stringify(likes)})">
❤️ ${likes.length}
</button>

<button class="btn-yellow" onclick="trocar('${i.id}')">
🔁 Trocar
</button>

${i.interessado && i.owner===user?.displayName?`
<button class="btn-blue" onclick="aceitar('${i.id}')">✔ Aceitar</button>
<button class="btn-red" onclick="recusar('${i.id}')">✖ Recusar</button>
`: ""}

<div style="margin-top:10px">
<strong>💬 Chat</strong>

<input id="msg-${i.id}" placeholder="Mensagem...">
<button class="btn-blue" onclick="enviarMsg('${i.id}')">Enviar</button>

<div>
${chat.map(m=>`<p>👤 ${m.user}: ${m.msg}</p>`).join("")}
</div>

</div>

</div>
`;
});
}

/* 🔄 LIVE UPDATE */
onSnapshot(collection(db,"itens"),snap=>{
dadosCache=[];
snap.forEach(d=>dadosCache.push({id:d.id,...d.data()}));
render(dadosCache);
});
</script>

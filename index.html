<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Troca</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#e8f5e9,#f1f8e9);
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:10;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.logo{
font-size:20px;
font-weight:bold;
color:#2e7d32;
}

/* HERO */
.hero{
text-align:center;
padding:30px 15px;
}

.hero h1{
font-size:22px;
color:#2e7d32;
}

.hero p{
font-size:13px;
color:#666;
}

/* FORM */
.formulario{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#43a047;
color:white;
border:none;
border-radius:10px;
}

/* LISTA */
#listaItens{
display:flex;
flex-direction:column;
gap:15px;
padding:15px;
}

.item{
background:white;
padding:15px;
border-radius:15px;
border-left:5px solid #43a047;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.item h3{
color:#2e7d32;
}

.small{
font-size:12px;
color:gray;
}

.chat{
margin-top:10px;
background:#f1f8e9;
padding:10px;
border-radius:10px;
font-size:13px;
}

.item button{
width:auto;
padding:8px 10px;
font-size:12px;
margin-top:8px;
border-radius:8px;
}

#usuarioBox{
color:#2e7d32;
font-weight:bold;
font-size:13px;
}
</style>
</head>

<body>

<header>
<div class="logo">🌱 Eco Troca</div>

<div>
<span id="usuarioBox"></span>
</div>
</header>

<section class="hero">
<h1>Troque hoje, transforme o amanhã!</h1>
<p>Reutilize, economize e ajude o planeta 🌱</p>
</section>

<section class="formulario">
<input id="nome" placeholder="Nome do item">
<input id="cidade" placeholder="Cidade">
<textarea id="descricao" placeholder="Descrição"></textarea>

<button onclick="publicar()">Publicar</button>

<input id="filtro" placeholder="Filtrar cidade" onkeyup="render()">
</section>

<div id="listaItens"></div>

<script>
let user = JSON.parse(localStorage.getItem("usuarioLogado"));
let itens = JSON.parse(localStorage.getItem("itens")) || [];

document.getElementById("usuarioBox").innerText =
user ? "👤 " + user.nome : "Não logado";

function publicar(){
if(!user){ alert("Faça login"); return; }

let nome = document.getElementById("nome").value;
let cidade = document.getElementById("cidade").value;
let descricao = document.getElementById("descricao").value;

itens.push({
id:Date.now(),
nome,cidade,descricao,
owner:user.nome,
chat:[]
});

localStorage.setItem("itens", JSON.stringify(itens));
render();
}

function render(){
let filtro = document.getElementById("filtro").value.toLowerCase();
let lista = document.getElementById("listaItens");
lista.innerHTML = "";

itens
.filter(i => i.cidade.toLowerCase().includes(filtro))
.forEach(i => {

lista.innerHTML += `
<div class="item">
<h3>${i.nome}</h3>
<p>${i.cidade}</p>
<p>${i.descricao}</p>
<p class="small">Por: ${i.owner}</p>

<button onclick="chat(${i.id})">Chat</button>

<div class="chat">
${i.chat.map(c=>`<div>${c}</div>`).join("")}
</div>
</div>
`;
});
}

function chat(id){
let msg = prompt("Mensagem:");
if(!msg) return;

let item = itens.find(i=>i.id===id);
item.chat.push(user.nome + ": " + msg);

localStorage.setItem("itens", JSON.stringify(itens));
render();
}

render();
</script>

</body>
</html>

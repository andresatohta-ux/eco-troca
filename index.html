<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Troca - Feira de Ciências</title>

<style>
body{font-family:Arial;margin:0;background:#eef7ee}
header{background:#2e7d32;color:#fff;padding:20px;text-align:center}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
input,select,textarea{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:1px solid #ccc}
button{padding:10px;border:none;border-radius:6px;cursor:pointer;margin-top:5px}
.btn{background:#2e7d32;color:#fff}
.btn-blue{background:#1565c0;color:#fff}
.btn-red{background:#c62828;color:#fff}
.btn-yellow{background:#f9a825;color:#000}
.userBox{display:flex;align-items:center;gap:10px}
.userBox img{width:40px;height:40px;border-radius:50%}
.badge{padding:4px 8px;background:orange;color:white;border-radius:6px;font-size:12px}
</style>
</head>

<body>

<header>
<h1>🌍 Eco Troca</h1>
<p>Feira de Ciências</p>
</header>

<div class="container">

<!-- LOGIN -->
<div class="card">
<h2>👤 Usuário</h2>
<div id="userInfo">Não logado</div>
<button class="btn" onclick="loginGoogle()">Entrar com Google</button>
<button class="btn-red" onclick="logout()">Sair</button>
</div>

<!-- PUBLICAR -->
<div class="card">
<h2>📦 Publicar item</h2>

<input id="nome" placeholder="Nome">
<input id="cidade" placeholder="Cidade">

<select id="categoria">
<option>Livro</option>
<option>Caderno</option>
<option>Mochila</option>
<option>Material</option>
</select>

<textarea id="descricao" placeholder="Descrição"></textarea>

<input id="imagem" type="file" accept="image/*" capture="environment">

<button class="btn" onclick="publicar()">Publicar</button>
</div>

<!-- FILTRO -->
<div class="card">
<h2>🔎 Filtro</h2>
<input id="filtroCidade" placeholder="Cidade">
<select id="filtroCategoria">
<option value="">Todas</option>
<option>Livro</option>
<option>Caderno</option>
<option>Mochila</option>
<option>Material</option>
</select>
<button class="btn-blue" onclick="aplicarFiltro()">Filtrar</button>
</div>

<div id="listaItens"></div>

</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
getFirestore,collection,addDoc,onSnapshot,doc,updateDoc,arrayUnion,arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

import {
getAuth,GoogleAuthProvider,signInWithPopup,onAuthStateChanged,signOut
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBQtiPkVwkTYNmbGXKD96FIOITKQ8oI62A",
authDomain:"eco-troca-fecb3.firebaseapp.com",
projectId:"eco-troca-fecb3",
storageBucket:"eco-troca-fecb3.firebasestorage.app",
messagingSenderId:"813565372",
appId:"1:813565372:web:470f850a6f11fda93b97b9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let dadosCache=[];
let imagemBase64="";

/* IMAGEM */
document.getElementById("imagem").addEventListener("change",e=>{
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=ev=>imagemBase64=ev.target.result;
reader.readAsDataURL(file);
});

/* LOGIN */
window.loginGoogle=()=>signInWithPopup(auth,new GoogleAuthProvider());
window.logout=()=>signOut(auth);

onAuthStateChanged(auth,u=>{
user=u;
document.getElementById("userInfo").innerText =
user?user.displayName:"Não logado";
});

/* PUBLICAR */
window.publicar=async()=>{
if(!user)return alert("login!");

await addDoc(collection(db,"itens"),{
nome:nome.value,
cidade:cidade.value,
categoria:categoria.value,
descricao:descricao.value,
imagem:imagemBase64||"",
owner:user.displayName,
uid:user.uid,
likes:[],
chat:{},
status:"livre"
});

alert("Publicado!");
};

/* ❤️ LIKE */
window.like=async(id,likes)=>{
if(!user)return;

const ref=doc(db,"itens",id);
const nome=user.displayName;

if(likes.includes(nome)){
await updateDoc(ref,{likes:arrayRemove(nome)});
}else{
await updateDoc(ref,{likes:arrayUnion(nome)});
}
};

/* 🔁 TROCA + CHAT PRIVADO */
window.trocar=async(id)=>{
if(!user)return;

const ref=doc(db,"itens",id);

await updateDoc(ref,{
status:"negociacao",
[`chat.${user.uid}`]:arrayUnion({
user:user.displayName,
msg:"Tenho interesse na troca",
time:Date.now()
})
});
};

/* ENVIAR MSG */
window.enviarMsg=async(id)=>{
const msg=document.getElementById("msg-"+id).value;
if(!msg)return;

const ref=doc(db,"itens",id);

await updateDoc(ref,{
[`chat.${user.uid}`]:arrayUnion({
user:user.displayName,
msg,
time:Date.now()
})
});

document.getElementById("msg-"+id).value="";
};

/* FILTRO */
window.aplicarFiltro=()=>{
render(dadosCache,
filtroCidade.value.toLowerCase(),
filtroCategoria.value
);
};

const lista=document.getElementById("listaItens");

function render(data,cidadeF="",catF=""){

lista.innerHTML="";

data.filter(i=>{
return i.cidade.toLowerCase().includes(cidadeF)&&(!catF||i.categoria===catF);
}).forEach(i=>{

const likes=i.likes||[];
const chat=i.chat?.[user?.uid]||[];

lista.innerHTML+=`
<div class="card">

<h3>${i.nome}</h3>
<p>${i.cidade} | ${i.categoria}</p>
<p>${i.descricao}</p>

${i.status==="negociacao"?'<div class="badge">🟡 Em negociação</div>':""}

${i.imagem?`<img src="${i.imagem}" style="width:100%">`:""}

<button class="btn-blue" onclick="like('${i.id}',${JSON.stringify(likes)})">
❤️ ${likes.length}
</button>

<button class="btn-yellow" onclick="trocar('${i.id}')">
🔁 Trocar
</button>

<div style="margin-top:10px">
<input id="msg-${i.id}" placeholder="Mensagem...">
<button class="btn-blue" onclick="enviarMsg('${i.id}')">Enviar</button>

<div>
${chat.map(m=>`<p>👤 ${m.user}: ${m.msg}</p>`).join("")}
</div>

</div>

</div>
`;
});
}

onSnapshot(collection(db,"itens"),snap=>{
dadosCache=[];
snap.forEach(d=>dadosCache.push({id:d.id,...d.data()}));
render(dadosCache);
});
</script>

</body>
</html>

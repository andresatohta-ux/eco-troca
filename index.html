<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Troca</title>

<style>
body{
font-family:'Segoe UI',Arial;
margin:0;
background:linear-gradient(180deg,#e8f5e9,#f5fff5);
color:#222;
}

/* HEADER */
header{
background:linear-gradient(135deg,#1b5e20,#2e7d32);
color:white;<style>
/* 🌿 FUNDO GERAL */
body{
margin:0;
font-family:'Segoe UI', Arial;
background: radial-gradient(circle at top, #e8f5e9, #f1f8e9, #ffffff);
color:#1b1b1b;
}

/* 🌍 HEADER MODERNO */
header{
position:sticky;
top:0;
z-index:10;
padding:18px;
text-align:center;
background: rgba(27,94,32,0.95);
backdrop-filter: blur(10px);
color:white;
box-shadow:0 6px 20px rgba(0,0,0,0.25);
border-bottom:1px solid rgba(255,255,255,0.1);
}

header h1{
margin:0;
font-size:22px;
letter-spacing:1px;
}

header p{
margin:5px 0 0;
font-size:13px;
opacity:0.8;
}

/* 📦 CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:15px;
}

/* 🧩 CARDS (GLASS STYLE) */
.card{
background: rgba(255,255,255,0.85);
backdrop-filter: blur(8px);
border:1px solid rgba(0,0,0,0.05);
padding:16px;
margin:14px 0;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.25s ease;
}

.card:hover{
transform: translateY(-3px);
box-shadow:0 14px 30px rgba(0,0,0,0.12);
}

/* ✏️ INPUTS MODERNOS */
input,select,textarea{
width:100%;
padding:12px;
margin-top:8px;
border-radius:12px;
border:1px solid rgba(0,0,0,0.1);
background:#f9f9f9;
font-size:14px;
outline:none;
transition:0.2s;
}

input:focus,textarea:focus,select:focus{
border:1px solid #2e7d32;
background:white;
box-shadow:0 0 0 3px rgba(46,125,50,0.15);
}

/* 🔘 BOTÕES PREMIUM */
button{
padding:10px 14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
opacity:0.9;
}

.btn{
background:linear-gradient(135deg,#2e7d32,#43a047);
color:white;
}

.btn-blue{
background:linear-gradient(135deg,#1565c0,#1e88e5);
color:white;
}

.btn-red{
background:linear-gradient(135deg,#c62828,#e53935);
color:white;
}

.btn-yellow{
background:linear-gradient(135deg,#f9a825,#fdd835);
color:#111;
}

/* 🟡 STATUS */
.badge{
display:inline-block;
padding:6px 12px;
margin-top:10px;
border-radius:999px;
font-size:12px;
background:linear-gradient(135deg,#ff9800,#ffb74d);
color:white;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* 🖼️ IMAGEM */
img{
width:100%;
border-radius:14px;
margin-top:10px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

/* 💬 CHAT STYLE */
.chat{
background:#f5f5f5;
padding:10px;
border-radius:12px;
margin-top:10px;
max-height:160px;
overflow:auto;
font-size:13px;
border:1px solid rgba(0,0,0,0.05);
}

/* 👤 USER */
#userInfo{
margin:10px 0;
font-weight:600;
color:#2e7d32;
}

/* 🔥 LAYOUT AÇÕES */
.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

/* 📱 RESPONSIVO */
@media (max-width:600px){
.card{
padding:14px;
border-radius:14px;
}

button{
width:100%;
}
}
</style>
</head>

<body>

<header>
<h1>🌍 Eco Troca</h1>
<p>Trocas sustentáveis entre alunos</p>
</header>

<div class="container">

<!-- LOGIN -->
<div class="card">
<h2>👤 Usuário</h2>
<div id="userInfo">Não logado</div>
<button class="btn" onclick="loginGoogle()">Entrar com Google</button>
<button class="btn-red" onclick="logout()">Sair</button>
</div>

<!-- PUBLICAR -->
<div class="card">
<h2>📦 Publicar item</h2>

<input id="nome" placeholder="Nome">
<input id="cidade" placeholder="Cidade">

<select id="categoria">
<option>Livro</option>
<option>Caderno</option>
<option>Mochila</option>
<option>Material</option>
</select>

<textarea id="descricao" placeholder="Descrição"></textarea>

<input id="imagem" type="file" accept="image/*" capture="environment">

<button class="btn" onclick="publicar()">Publicar</button>
</div>

<!-- LISTA -->
<div id="listaItens"></div>

</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
getFirestore,collection,addDoc,onSnapshot,doc,updateDoc,arrayUnion,arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

import {
getAuth,GoogleAuthProvider,signInWithPopup,onAuthStateChanged,signOut
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyBQtiPkVwkTYNmbGXKD96FIOITKQ8oI62A",
authDomain:"eco-troca-fecb3.firebaseapp.com",
projectId:"eco-troca-fecb3",
storageBucket:"eco-troca-fecb3.appspot.com",
messagingSenderId:"813565372",
appId:"1:813565372:web:470f850a6f11fda93b97b9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let imagemBase64="";
const lista=document.getElementById("listaItens");

/* IMAGEM */
document.getElementById("imagem").addEventListener("change",e=>{
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=ev=>imagemBase64=ev.target.result;
reader.readAsDataURL(file);
});

/* LOGIN */
window.loginGoogle=()=>signInWithPopup(auth,new GoogleAuthProvider());
window.logout=()=>signOut(auth);

onAuthStateChanged(auth,u=>{
user=u;
document.getElementById("userInfo").innerText =
user?user.displayName:"Não logado";
});

/* PUBLICAR */
window.publicar=async()=>{
if(!user)return alert("Faça login!");

await addDoc(collection(db,"itens"),{
nome:nome.value,
cidade:cidade.value,
categoria:categoria.value,
descricao:descricao.value,
imagem:imagemBase64||"",
uid:user.uid,
owner:user.displayName,
likes:[],
chat:[],
status:"livre"
});
};

/* LIKE */
window.like=async(id,likes)=>{
if(!user)return;

const ref=doc(db,"itens",id);

if(likes.includes(user.uid)){
await updateDoc(ref,{likes:arrayRemove(user.uid)});
}else{
await updateDoc(ref,{likes:arrayUnion(user.uid)});
}
};

/* TROCA */
window.trocar=async(id)=>{
if(!user)return;

await updateDoc(doc(db,"itens",id),{
status:"negociacao",
chat:arrayUnion({
uid:user.uid,
user:user.displayName,
msg:"Tenho interesse na troca",
time:Date.now()
})
});
};

/* MENSAGEM */
window.enviarMsg=async(id)=>{
if(!user)return;

const input=document.getElementById("msg-"+id);
const msg=(input?.value||"").trim();
if(!msg)return;

await updateDoc(doc(db,"itens",id),{
chat:arrayUnion({
uid:user.uid,
user:user.displayName,
msg,
time:Date.now()
})
});

input.value="";
};

/* RENDER */
function render(data){

lista.innerHTML="";

data.forEach(i=>{

const likes=Array.isArray(i.likes)?i.likes:[];
const chat=Array.isArray(i.chat)?i.chat:[];

lista.innerHTML+=`
<div class="card">

<h3>${i.nome||""}</h3>
<p>${i.cidade||""} | ${i.categoria||""}</p>
<p>${i.descricao||""}</p>

${i.status==="negociacao"?'<div class="badge">🟡 Em negociação</div>':""}

${i.imagem?`<img src="${i.imagem}">`:""}

<div class="actions">

<button class="btn-blue" onclick="like('${i.id}',${JSON.stringify(likes)})">
❤️ ${likes.length}
</button>

<button class="btn-yellow" onclick="trocar('${i.id}')">
🔁 Trocar
</button>

</div>

<div style="margin-top:10px">

<input id="msg-${i.id}" placeholder="Mensagem...">
<button class="btn-blue" onclick="enviarMsg('${i.id}')">Enviar</button>

<div class="chat">
${chat.map(m=>`
<p><b>${m.user}</b>: ${m.msg}</p>
`).join("")}
</div>

</div>

</div>
`;
});
}

/* FIRESTORE REALTIME */
onSnapshot(collection(db,"itens"),snap=>{
const data=[];
snap.forEach(d=>data.push({id:d.id,...d.data()}));
render(data);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Troca</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

.item{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
margin-top:5px;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
}

.chat{
background:#eee;
margin-top:10px;
padding:8px;
border-radius:8px;
font-size:14px;
}

.small{
font-size:12px;
color:#555;
}
</style>
</head>

<body>

<h2>🌍 Eco Troca</h2>

<div id="usuarioBox"></div>

<hr>

<h3>Publicar item</h3>

<input id="nome" placeholder="Nome"><br><br>
<input id="cidade" placeholder="Cidade"><br><br>
<textarea id="descricao" placeholder="Descrição"></textarea><br><br>
<input id="imagem" placeholder="URL da imagem"><br><br>

<button onclick="publicar()">Publicar</button>

<hr>

<div id="listaItens"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
updateDoc,
arrayUnion,
arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyBQtiPkVwkTYNmbGXKD96FIOITKQ8oI62A",
authDomain: "eco-troca-fecb3.firebaseapp.com",
projectId: "eco-troca-fecb3",
storageBucket: "eco-troca-fecb3.firebasestorage.app",
messagingSenderId: "813565372",
appId: "1:813565372:web:470f850a6f11fda93b97b9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* USER */
let user = JSON.parse(localStorage.getItem("usuarioLogado") || "null");

function setUserBox(){
const box = document.getElementById("usuarioBox");
if(box){
box.innerText = user ? "👤 " + user.nome : "Não logado";
}
}

/* PUBLICAR */
window.publicar = async function(){

if(!user){
alert("Faça login primeiro!");
return;
}

let nome = document.getElementById("nome")?.value;
let cidade = document.getElementById("cidade")?.value;
let descricao = document.getElementById("descricao")?.value;
let imagem = document.getElementById("imagem")?.value || "";

if(!nome || !cidade){
alert("Preencha os campos!");
return;
}

await addDoc(collection(db, "itens"), {
nome,
cidade,
descricao,
imagem,
owner: user.nome,
chat: [],
likes: []
});

alert("Publicado 🌍");
}

/* EXCLUIR */
window.excluir = async function(id){
await deleteDoc(doc(db, "itens", id));
}

/* CURTIR */
window.like = async function(id, likes, nomeUser){

nomeUser = nomeUser || "";

const ref = doc(db, "itens", id);

likes = likes || [];

if(likes.includes(nomeUser)){
await updateDoc(ref, {
likes: arrayRemove(nomeUser)
});
}else{
await updateDoc(ref, {
likes: arrayUnion(nomeUser)
});
}
}

/* CHAT */
window.chat = async function(id){

let msg = prompt("Mensagem:");
if(!msg) return;

const ref = doc(db, "itens", id);

await updateDoc(ref, {
chat: arrayUnion(user?.nome + ": " + msg)
});
}

/* RENDER (CORRIGIDO - SEM DUPLICAR LISTENER) */
function render(){

const lista = document.getElementById("listaItens");
if(!lista) return;

onSnapshot(collection(db, "itens"), (snapshot) => {

lista.innerHTML = "";

snapshot.forEach((d) => {

let i = d.data();

let isOwner = user && i.owner === user.nome;

let likes = i.likes || [];
let chat = i.chat || [];

lista.innerHTML += `
<div class="item">

<h3>${i.nome || ""}</h3>

${i.imagem ? `
<img src="${i.imagem}" style="width:100%;border-radius:10px;margin-top:8px;">
` : ""}

<p>${i.cidade || ""}</p>
<p>${i.descricao || ""}</p>
<p class="small">Por: ${i.owner || ""}</p>

<button onclick="like('${d.id}', ${JSON.stringify(likes)}, '${user?.nome || ""}')">
❤️ Curtir (${likes.length})
</button>

<button onclick="chat('${d.id}')">💬 Chat</button>

${isOwner ? `
<button onclick="excluir('${d.id}')" style="background:#d32f2f;color:white;">
🗑 Excluir
</button>
` : ""}

<div class="chat">
${chat.map(c => `<div>${c}</div>`).join("")}
</div>

</div>
`;
});

});

}

/* START */
window.onload = () => {
setUserBox();
render();
};

</script>

</body>
</html>

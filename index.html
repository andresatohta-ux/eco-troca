<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Troca - Projeto Escolar</title>

<style>
body{
font-family: Arial;
margin:0;
background:#f1f8f4;
color:#222;
}

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

.btn{
background:#2e7d32;
color:white;
}

.btn-red{
background:#c62828;
color:white;
}

.btn-blue{
background:#1565c0;
color:white;
}

.small{
font-size:12px;
color:#666;
}

.chat{
background:#eee;
padding:8px;
margin-top:10px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>🌍 Eco Troca</h1>
<p>Projeto escolar de sustentabilidade e reutilização de materiais</p>
</header>

<div class="container">

<!-- SOBRE -->
<div class="card">
<h2>♻️ Sobre o projeto</h2>
<p>
O Eco Troca é uma plataforma criada para incentivar a troca de materiais escolares entre alunos,
reduzindo o desperdício e promovendo a sustentabilidade.
</p>
</div>

<!-- PUBLICAR -->
<div class="card">
<h2>📦 Publicar item</h2>

<input id="nome" placeholder="Nome do item">
<input id="cidade" placeholder="Cidade">
<textarea id="descricao" placeholder="Descrição"></textarea>
<input id="imagem" placeholder="URL da imagem">

<button class="btn" onclick="publicar()">Publicar</button>
</div>

<!-- LISTA -->
<div id="listaItens"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
updateDoc,
arrayUnion,
arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyBQtiPkVwkTYNmbGXKD96FIOITKQ8oI62A",
authDomain: "eco-troca-fecb3.firebaseapp.com",
projectId: "eco-troca-fecb3",
storageBucket: "eco-troca-fecb3.firebasestorage.app",
messagingSenderId: "813565372",
appId: "1:813565372:web:470f850a6f11fda93b97b9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* usuário simples */
let user = JSON.parse(localStorage.getItem("usuarioLogado") || "null");
if(!user){
user = { nome: "Aluno" };
}

/* PUBLICAR */
window.publicar = async function(){

let nome = document.getElementById("nome").value;
let cidade = document.getElementById("cidade").value;
let descricao = document.getElementById("descricao").value;
let imagem = document.getElementById("imagem").value || "";

if(!nome || !cidade){
alert("Preencha os campos!");
return;
}

await addDoc(collection(db, "itens"), {
nome,
cidade,
descricao,
imagem,
owner: user.nome,
likes: [],
chat: []
});

alert("Item publicado!");
}

/* CURTIR */
window.like = async function(id, likes){

let ref = doc(db, "itens", id);

if(likes.includes(user.nome)){
await updateDoc(ref,{
likes: arrayRemove(user.nome)
});
}else{
await updateDoc(ref,{
likes: arrayUnion(user.nome)
});
}
}

/* CHAT */
window.chat = async function(id){

let msg = prompt("Digite sua mensagem:");
if(!msg) return;

let ref = doc(db, "itens", id);

await updateDoc(ref,{
chat: arrayUnion(user.nome + ": " + msg)
});
}

/* EXCLUIR */
window.excluir = async function(id){
await deleteDoc(doc(db,"itens",id));
}

/* LISTA */
const lista = document.getElementById("listaItens");

onSnapshot(collection(db,"itens"), (snapshot)=>{

lista.innerHTML = "";

snapshot.forEach((d)=>{

let i = d.data();
let likes = i.likes || [];
let chat = i.chat || [];
let isOwner = i.owner === user.nome;

lista.innerHTML += `
<div class="card">

<h3>${i.nome}</h3>
<p>📍 ${i.cidade}</p>
<p>${i.descricao}</p>
<p class="small">por ${i.owner}</p>

${i.imagem ? `<img src="${i.imagem}" style="width:100%;border-radius:10px;">` : ""}

<button class="btn-blue" onclick="like('${d.id}', ${JSON.stringify(likes)})">
❤️ Curtir (${likes.length})
</button>

<button class="btn-blue" onclick="chat('${d.id}')">💬 Chat</button>

${isOwner ? `
<button class="btn-red" onclick="excluir('${d.id}')">🗑 Excluir</button>
` : ""}

<div class="chat">
${chat.map(c=>`<div>${c}</div>`).join("")}
</div>

</div>
`;
});

});
</script>

</body>
</html>

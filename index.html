<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Troca</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#e8f5e9,#f1f8e9);
}

/* HEADER APP */
header{
position:sticky;
top:0;
z-index:10;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 18px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.logo{
font-size:20px;
font-weight:bold;
color:#2e7d32;
}

/* HERO */
.hero{
text-align:center;
padding:40px 20px;
}

.hero h1{
font-size:24px;
color:#2e7d32;
}

.hero p{
font-size:14px;
color:#555;
margin-top:8px;
}

/* BOTÕES */
button{
background:#43a047;
color:white;
border:none;
padding:12px;
border-radius:10px;
margin-top:10px;
width:100%;
font-size:14px;
}

/* FORM */
.formulario{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

/* FILTRO */
#filtroCidade{
margin-top:10px;
}

/* LISTA */
#listaItens{
display:flex;
flex-direction:column;
gap:15px;
padding:15px;
}

.item{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
border-left:5px solid #43a047;
}

.item h3{
color:#2e7d32;
margin-bottom:5px;
}

.small{
font-size:12px;
color:gray;
margin-top:5px;
}

/* CHAT */
.chat{
margin-top:10px;
background:#f1f8e9;
padding:10px;
border-radius:10px;
font-size:13px;
}

/* USUÁRIO */
#usuarioBox{
color:#2e7d32;
font-weight:bold;
font-size:13px;
}

/* BOTÕES DO ITEM */
.item button{
width:auto;
padding:8px 10px;
margin-top:8px;
font-size:12px;
border-radius:8px;
}

/* RESPONSIVO */
@media(max-width:600px){
.hero h1{
font-size:20px;
}
}
</style>
</head>

<body>

<header>
<div class="logo">🌱 Eco Troca</div>

<nav>
<a href="#inicio" style="color:#2e7d32;text-decoration:none;font-weight:bold;">Início</a>
<a href="#itens" style="color:#2e7d32;text-decoration:none;font-weight:bold;">Itens</a>
<a href="#sobre" style="color:#2e7d32;text-decoration:none;font-weight:bold;">Sobre</a>
</nav>

<div>
<span id="usuarioBox"></span>
<button onclick="login()">Login</button>
</div>
</header>

<section class="hero" id="inicio">
<h1>Troque hoje, transforme o amanhã!</h1>
<p>Troque objetos usados e ajude o meio ambiente 🌱</p>
</section>

<section class="formulario">
<h3>Publicar item</h3>

<input id="nome" placeholder="Nome do item">
<input id="cidade" placeholder="Cidade">
<textarea id="descricao" placeholder="Descrição"></textarea>

<button onclick="publicarItem()">Publicar</button>

<input id="filtroCidade" placeholder="Filtrar por cidade" onkeyup="mostrarItens()">
</section>

<h2 style="text-align:center;color:#2e7d32">Itens Disponíveis</h2>
<div id="listaItens"></div>

<footer id="sobre" style="text-align:center;padding:20px;background:#2e7d32;color:white;margin-top:20px;">
Eco Troca - Projeto Escolar de Sustentabilidade 🌱
</footer>

<script>
let itens = JSON.parse(localStorage.getItem("itens")) || [];
let usuario = JSON.parse(localStorage.getItem("usuarioLogado")) || null;

function login(){
let nome = prompt("Digite seu nome:");
if(!nome) return;

usuario = {nome};
localStorage.setItem("usuarioLogado", JSON.stringify(usuario));
atualizarUsuario();
}

function atualizarUsuario(){
if(usuario){
document.getElementById("usuarioBox").innerText = "👤 " + usuario.nome;
}
}

function publicarItem(){

if(!usuario){
alert("Você precisa estar logado!");
return;
}

let nome = document.getElementById("nome").value;
let cidade = document.getElementById("cidade").value;
let descricao = document.getElementById("descricao").value;

if(!nome || !cidade){
alert("Preencha tudo!");
return;
}

let item = {
id: Date.now(),
nome,
cidade,
descricao,
owner: usuario.nome,
chat: []
};

itens.push(item);
localStorage.setItem("itens", JSON.stringify(itens));

mostrarItens();
}

function excluirItem(id){
itens = itens.filter(i => i.id !== id);
localStorage.setItem("itens", JSON.stringify(itens));
mostrarItens();
}

function enviarMensagem(id){
let msg = prompt("Mensagem:");
if(!msg) return;

let item = itens.find(i => i.id === id);
item.chat.push(usuario.nome + ": " + msg);

localStorage.setItem("itens", JSON.stringify(itens));
mostrarItens();
}

function mostrarItens(){

let filtro = document.getElementById("filtroCidade").value.toLowerCase();
let lista = document.getElementById("listaItens");
lista.innerHTML = "";

itens
.filter(i => i.cidade.toLowerCase().includes(filtro))
.forEach(item => {

lista.innerHTML += `
<div class="item">
<h3>${item.nome}</h3>
<p><b>Cidade:</b> ${item.cidade}</p>
<p>${item.descricao}</p>
<p class="small">Publicado por: ${item.owner}</p>

<button onclick="enviarMensagem(${item.id})">Chat</button>

${usuario && usuario.nome === item.owner ? 
`<button onclick="excluirItem(${item.id})">Excluir</button>` 
: ""}

<div class="chat">
${item.chat.map(c => `<div>${c}</div>`).join("")}
</div>
</div>
`;
});
}

atualizarUsuario();
mostrarItens();
</script>

</body>
</html>

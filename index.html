<script>
let user = JSON.parse(localStorage.getItem("usuarioLogado"));
let itens = JSON.parse(localStorage.getItem("itens")) || [];

/* USER */
document.getElementById("usuarioBox").innerText =
user ? "👤 " + user.nome : "Não logado";

/* PUBLICAR */
function publicar(){
if(!user){
alert("Faça login primeiro!");
return;
}

let nome = document.getElementById("nome").value;
let cidade = document.getElementById("cidade").value;
let descricao = document.getElementById("descricao").value;

if(!nome || !cidade){
alert("Preencha os campos!");
return;
}

let imagem = document.getElementById("imagem") 
? document.getElementById("imagem").value 
: "";

itens.push({
id: Date.now(),
nome,
cidade,
descricao,
imagem,
owner: user.nome,
chat: [],
likes: []
});

localStorage.setItem("itens", JSON.stringify(itens));

document.getElementById("nome").value="";
document.getElementById("cidade").value="";
document.getElementById("descricao").value="";

if(document.getElementById("imagem")){
document.getElementById("imagem").value="";
}

alert("Item publicado com sucesso 🌱");

render();
}

/* LIKE */
function like(id){
let item = itens.find(i => i.id === id);

if(!item.likes){
item.likes = [];
}

if(!item.likes.includes(user.nome)){
item.likes.push(user.nome);
}else{
item.likes = item.likes.filter(u => u !== user.nome);
}

localStorage.setItem("itens", JSON.stringify(itens));
render();
}

/* CHAT */
function chat(id){
let msg = prompt("Mensagem:");
if(!msg) return;

let item = itens.find(i => i.id === id);
item.chat.push(user.nome + ": " + msg);

localStorage.setItem("itens", JSON.stringify(itens));
render();
}

/* EXCLUIR */
function excluir(id){
if(!confirm("Tem certeza que deseja excluir esta publicação?")) return;

itens = itens.filter(i => i.id !== id);

localStorage.setItem("itens", JSON.stringify(itens));
render();
}

/* RENDER */
function render(){
let filtro = document.getElementById("filtro").value.toLowerCase();
let lista = document.getElementById("listaItens");
lista.innerHTML = "";

itens
.filter(i => i.cidade.toLowerCase().includes(filtro))
.forEach(i => {

let isOwner = user && i.owner === user.nome;

lista.innerHTML += `
<div class="item">
<h3>${i.nome}</h3>

${i.imagem ? `
<img src="${i.imagem}" 
style="width:100%;border-radius:10px;margin-top:8px;">
` : ""}

<p>${i.cidade}</p>
<p>${i.descricao}</p>
<p class="small">Por: ${i.owner}</p>

<button onclick="like(${i.id})">
❤️ Curtir (${i.likes ? i.likes.length : 0})
</button>

<button onclick="chat(${i.id})">💬 Chat</button>

${isOwner ? `
<button onclick="excluir(${i.id})" style="background:#d32f2f;">
🗑 Excluir
</button>
` : ""}

<div class="chat">
${i.chat.map(c => `<div>${c}</div>`).join("")}
</div>
</div>
`;
});
}

render();
</script>

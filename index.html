<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Troca</title>

<style>
body{
margin:0;
font-family:'Segoe UI', Arial;
background: radial-gradient(circle at top,#0f172a,#050816,#000);
color:#e5e7eb;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:10;
padding:16px;
text-align:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(34,211,238,0.2);
}

header h1{
margin:0;
font-size:20px;
color:#22d3ee;
}

/* TABS */
.tab{
display:none;
padding:15px;
max-width:900px;
margin:auto;
}

.tab.active{
display:block;
}

/* CARD */
.card{
background:rgba(15,23,42,0.75);
border:1px solid rgba(34,211,238,0.15);
padding:14px;
margin:12px 0;
border-radius:14px;
}

/* INPUT */
input,select,textarea{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #1f2937;
background:#0b1220;
color:white;
outline:none;
}

/* BOTÕES */
button{
padding:10px 12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.btn{background:#22c55e;color:black}
.btn-blue{background:#3b82f6;color:white}
.btn-red{background:#ef4444;color:white}
.btn-yellow{background:#facc15;color:black}

/* CHAT */
.chat{
background:#0b1220;
padding:10px;
border-radius:10px;
margin-top:10px;
max-height:160px;
overflow:auto;
font-size:13px;
border:1px solid #1f2937;
}

/* BADGE */
.badge{
display:inline-block;
padding:5px 10px;
border-radius:999px;
background:#facc15;
color:black;
font-size:12px;
margin-top:6px;
}

/* IMAGEM */
img{
width:100%;
border-radius:12px;
margin-top:10px;
}

/* NAV BAR */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
justify-content:space-around;
background:#0f172a;
border-top:1px solid #1f2937;
padding:10px;
}

.nav button{
background:none;
color:white;
font-size:14px;
}

/* MOBILE */
@media(max-width:600px){
button{width:100%}
}
</style>
</head>

<body>

<header>
<h1>🌍 Eco Troca</h1>
</header>

<!-- FEED -->
<div id="feed" class="tab active">
<div id="listaItens"></div>
</div>

<!-- POSTAR -->
<div id="postar" class="tab">
<div class="card">
<h3>📦 Publicar item</h3>

<input id="nome" placeholder="Nome">
<input id="cidade" placeholder="Cidade">

<select id="categoria">
<option>Livro</option>
<option>Caderno</option>
<option>Mochila</option>
<option>Material</option>
</select>

<textarea id="descricao" placeholder="Descrição"></textarea>

<input id="imagem" type="file">

<button class="btn" onclick="publicar()">Publicar</button>
</div>
</div>

<!-- PERFIL -->
<div id="perfil" class="tab">
<div class="card">
<h3>👤 Usuário</h3>
<div id="userInfo">Não logado</div>

<button class="btn-blue" onclick="loginGoogle()">Login</button>
<button class="btn-red" onclick="logout()">Sair</button>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="showTab('feed')">🏠 Feed</button>
<button onclick="showTab('postar')">➕ Postar</button>
<button onclick="showTab('perfil')">👤 Perfil</button>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
getFirestore,collection,addDoc,onSnapshot,doc,updateDoc,arrayUnion,arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

import {
getAuth,GoogleAuthProvider,signInWithPopup,onAuthStateChanged,signOut
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyBQtiPkVwkTYNmbGXKD96FIOITKQ8oI62A",
authDomain:"eco-troca-fecb3.firebaseapp.com",
projectId:"eco-troca-fecb3",
storageBucket:"eco-troca-fecb3.appspot.com",
messagingSenderId:"813565372",
appId:"1:813565372:web:470f850a6f11fda93b97b9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let imagemBase64="";
const lista=document.getElementById("listaItens");

/* NAV */
window.showTab=(tab)=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(tab).classList.add("active");
};

/* IMAGE */
document.getElementById("imagem")?.addEventListener("change",e=>{
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=ev=>imagemBase64=ev.target.result;
reader.readAsDataURL(file);
});

/* LOGIN */
window.loginGoogle=()=>signInWithPopup(auth,new GoogleAuthProvider());
window.logout=()=>signOut(auth);

onAuthStateChanged(auth,u=>{
user=u;
document.getElementById("userInfo").innerText=
user?user.displayName:"Não logado";
});

/* PUBLICAR */
window.publicar=async()=>{
if(!user)return alert("login!");

await addDoc(collection(db,"itens"),{
nome:nome.value,
cidade:cidade.value,
categoria:categoria.value,
descricao:descricao.value,
imagem:imagemBase64||"",
uid:user.uid,
owner:user.displayName,
likes:[],
chat:[],
status:"livre"
});
};

/* LIKE */
window.like=async(id,likes)=>{
const ref=doc(db,"itens",id);

if(likes.includes(user.uid)){
await updateDoc(ref,{likes:arrayRemove(user.uid)});
}else{
await updateDoc(ref,{likes:arrayUnion(user.uid)});
}
};

/* TROCA */
window.trocar=async(id)=>{
await updateDoc(doc(db,"itens",id),{
status:"negociacao",
chat:arrayUnion({
uid:user.uid,
user:user.displayName,
msg:"Tenho interesse na troca",
time:Date.now()
})
});
};

/* MSG */
window.enviarMsg=async(id)=>{
const input=document.getElementById("msg-"+id);
const msg=(input?.value||"").trim();

await updateDoc(doc(db,"itens",id),{
chat:arrayUnion({
uid:user.uid,
user:user.displayName,
msg,
time:Date.now()
})
});

input.value="";
};

/* RENDER */
function render(data){
lista.innerHTML="";

data.forEach(i=>{

const likes=Array.isArray(i.likes)?i.likes:[];
const chat=Array.isArray(i.chat)?i.chat:[];

lista.innerHTML+=`
<div class="card">

<h3>${i.nome||""}</h3>
<p>${i.cidade||""} | ${i.categoria||""}</p>
<p>${i.descricao||""}</p>

${i.status==="negociacao"?'<div class="badge">🟡 Em negociação</div>':""}

${i.imagem?`<img src="${i.imagem}">`:""}

<button class="btn-blue" onclick="like('${i.id}',${JSON.stringify(likes)})">
❤️ ${likes.length}
</button>

<button class="btn-yellow" onclick="trocar('${i.id}')">
🔁 Trocar
</button>

<div style="margin-top:10px">

<input id="msg-${i.id}" placeholder="Mensagem...">
<button class="btn-blue" onclick="enviarMsg('${i.id}')">Enviar</button>

<div class="chat">
${chat.map(m=>`<p><b>${m.user}</b>: ${m.msg}</p>`).join("")}
</div>

</div>

</div>
`;
});
}

/* FIRESTORE */
onSnapshot(collection(db,"itens"),snap=>{
const data=[];
snap.forEach(d=>data.push({id:d.id,...d.data()}));
render(data);
});
</script>

</body>
</html>

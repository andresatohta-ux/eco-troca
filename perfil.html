<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfil - Eco Troca</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5fff5;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}

.foto{
width:120px;
height:120px;
border-radius:50%;
background:#43a047;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
margin:auto;
margin-bottom:20px;
}

h1{
color:#2e7d32;
margin-bottom:20px;
}

.info{
margin-top:15px;
font-size:18px;
}

.pontos{
margin-top:25px;
padding:20px;
background:#e8f5e9;
border-radius:12px;
}

.pontos h2{
color:#2e7d32;
}

.botoes{
margin-top:25px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
}

.voltar{
background:#43a047;
}

.sair{
background:#e53935;
}

@media(max-width:768px){

.card{
padding:20px;
}

.info{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="foto">👤</div>

<h1 id="nome">Usuário</h1>

<div class="info">
<strong>Email:</strong>
<span id="email"></span>
</div>

<div class="info">
<strong>Cidade:</strong>
<span id="cidade"></span>
</div>

<div class="pontos">

<h2>🌱 Pontos Ecológicos</h2>

<h1 id="pontos">0</h1>

</div>

<div class="botoes">

<button class="voltar"
onclick="window.location.href='index.html'">
Voltar ao Início </button>

<button class="sair"
onclick="logout()">
Sair </button>

</div>

</div>

</div>

<script>

let usuario =
JSON.parse(
localStorage.getItem("usuarioLogado")
);

if(!usuario){

alert("Faça login primeiro!");

window.location.href="login.html";

}

document.getElementById("nome").innerText =
usuario.nome;

document.getElementById("email").innerText =
usuario.email;

document.getElementById("cidade").innerText =
usuario.cidade;

document.getElementById("pontos").innerText =
usuario.pontos || 0;

function logout(){

localStorage.removeItem("usuarioLogado");

window.location.href="login.html";

}

</script>

</body>
</html>

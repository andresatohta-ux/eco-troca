<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Eco Troca</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5fff5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:12px;
width:350px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
text-align:center;
color:#2e7d32;
}

input{
width:100%;
padding:12px;
margin-top:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#43a047;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:15px;
color:#2e7d32;
text-decoration:none;
}
</style>
</head>

<body>

<div class="box">

<h2>🌱 Login</h2>

<input id="email" placeholder="Email">

<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<a href="cadastro.html">Criar conta</a>

</div>

<script>

function login(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

const usuario =
JSON.parse(localStorage.getItem(email));

if(usuario && usuario.senha === senha){

localStorage.setItem(
"usuarioLogado",
JSON.stringify(usuario)
);

window.location.href="index.html";

}else{

alert("Email ou senha incorretos");

}

}

</script>

</body>
</html>

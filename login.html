<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Eco Troca</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#e8f5e9,#f1f8e9);
}

/* CARD LOGIN */
.container{
width:90%;
max-width:350px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
text-align:center;
}

/* LOGO */
.logo{
font-size:28px;
font-weight:bold;
color:#2e7d32;
margin-bottom:10px;
}

.subtitle{
font-size:14px;
color:#666;
margin-bottom:20px;
}

/* INPUTS */
input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:10px;
font-size:14px;
outline:none;
}

input:focus{
border-color:#43a047;
}

/* BOTÃO */
button{
width:100%;
padding:12px;
margin-top:15px;
background:#43a047;
color:white;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2e7d32;
}

/* TEXTO */
.small{
font-size:12px;
color:gray;
margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
<div class="logo">🌱 Eco Troca</div>
<div class="subtitle">Entre para trocar itens sustentáveis</div>

<input id="nome" placeholder="Digite seu nome">
<input id="cidade" placeholder="Sua cidade">

<button onclick="login()">Entrar</button>

<div class="small">Projeto escolar de sustentabilidade</div>
</div>

<script>
function login(){
let nome = document.getElementById("nome").value;
let cidade = document.getElementById("cidade").value;

if(!nome || !cidade){
alert("Preencha todos os campos!");
return;
}

let usuario = {
nome,
cidade
};

localStorage.setItem("usuarioLogado", JSON.stringify(usuario));

window.location.href = "index.html";
}
</script>

</body>
</html>

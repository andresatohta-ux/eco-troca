<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Troca - Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#e8f5e9,#f1f8e9);
overflow:hidden;
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(67,160,71,0.12);
}

.c1{width:150px;height:150px;top:10%;left:10%;}
.c2{width:200px;height:200px;bottom:10%;right:10%;}

.container{
width:90%;
max-width:360px;
background:white;
padding:30px 25px;
border-radius:22px;
box-shadow:0 15px 35px rgba(0,0,0,.12);
text-align:center;
animation:fadeIn .6s ease;
z-index:2;
}

.logo{
font-size:34px;
color:#2e7d32;
font-weight:bold;
}

.subtitle{
font-size:13px;
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:13px;
margin-top:12px;
border:1px solid #ddd;
border-radius:12px;
outline:none;
transition:0.3s;
}

input:focus{
border-color:#43a047;
box-shadow:0 0 8px rgba(67,160,71,0.2);
}

button{
width:100%;
padding:13px;
margin-top:18px;
background:#43a047;
color:white;
border:none;
border-radius:12px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2e7d32;
}

.small{
font-size:12px;
color:gray;
margin-top:15px;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="circle c1"></div>
<div class="circle c2"></div>

<div class="container">
<div class="logo">🌱 Eco Troca</div>
<div class="subtitle">Troque itens e ajude o planeta</div>

<input id="nome" placeholder="Seu nome">
<input id="cidade" placeholder="Sua cidade">

<button onclick="login()">Entrar</button>

<div class="small">Projeto escolar de sustentabilidade</div>
</div>

<script>
function login(){
let nome = document.getElementById("nome").value;
let cidade = document.getElementById("cidade").value;

if(!nome || !cidade){
alert("Preencha todos os campos!");
return;
}

let btn = document.querySelector("button");
btn.innerText = "Entrando...";

setTimeout(() => {
localStorage.setItem("usuarioLogado", JSON.stringify({nome, cidade}));
window.location.href = "index.html";
}, 800);
}
</script>

</body>
</html>

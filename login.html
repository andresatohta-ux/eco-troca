<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login - Eco Troca</title>

<style>
body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5fff5;
}

.box{
background:white;
padding:30px;
border-radius:12px;
width:350px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#43a047;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>🌱 Login</h2>

<input id="email" placeholder="Email">

<input
id="senha"
type="password"
placeholder="Senha">

<button onclick="login()">
Entrar
</button>

<a href="cadastro.html">
Criar conta
</a>

</div>

<script>

function login(){

let email =
document.getElementById("email").value;

let senha =
document.getElementById("senha").value;

let usuario =
JSON.parse(
localStorage.getItem(email)
);

if(
usuario &&
usuario.senha === senha
){

localStorage.setItem(
"usuarioLogado",
JSON.stringify(usuario)
);

location.href="index.html";

}else{

alert("Login inválido");

}

}

</script>

</body>
</html>

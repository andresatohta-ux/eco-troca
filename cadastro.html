<!DOCTYPE html>
<html>
<head>
<title>Cadastro</title>
</head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>

body{
font-family:Arial;
background:#f5fff5;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#43a047;
color:white;
border:none;
border-radius:8px;
}

</style>
<body>

<h2>Criar Conta</h2>

<input id="nome" placeholder="Nome">

<input id="cidade" placeholder="Cidade">

<input id="email" placeholder="Email">

<input
id="senha"
type="password"
placeholder="Senha">

<button onclick="cadastrar()">
Cadastrar
</button>

<script>

function cadastrar(){

let usuario = {

nome:
document.getElementById("nome").value,

cidade:
document.getElementById("cidade").value,

email:
document.getElementById("email").value,

senha:
document.getElementById("senha").value,

pontos:0,

trocas:0

};

localStorage.setItem(
usuario.email,
JSON.stringify(usuario)
);

alert("Conta criada!");

location.href="login.html";

}

</script>

</body>
</html>
